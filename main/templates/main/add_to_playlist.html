{% extends 'main/base.html' %}

{% block content %}
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header">
                    <h5 class="mb-0">Добавить в плейлист</h5>
                </div>
                <div class="card-body">
                    <div class="song-info mb-4">
                        <h6 class="mb-2">{{ title }}</h6>
                        <p class="text-muted mb-0">{{ artist }}</p>
                    </div>
                    
                    <form method="post" action="{% url 'add_to_playlist' %}" id="addToPlaylistForm">
                        {% csrf_token %}
                        <input type="hidden" name="deezer_id" value="{{ deezer_id }}">
                        <input type="hidden" name="title" value="{{ title }}">
                        <input type="hidden" name="artist" value="{{ artist }}">
                        <input type="hidden" name="preview_url" value="{{ preview_url }}">
                        <input type="hidden" name="cover_url" value="{{ cover_url }}">
                        <input type="hidden" name="next" value="{{ request.META.HTTP_REFERER }}">
                        <input type="hidden" name="scroll_position" id="scrollPosition">
                        
                        <div class="mb-3">
                            <label class="form-label">Выберите плейлист:</label>
                            <div class="list-group">
                                {% for playlist in playlists %}
                                <label class="list-group-item">
                                    <input class="form-check-input me-1" type="radio" name="playlist" value="{{ playlist.id }}" required>
                                    {{ playlist.name }}
                                </label>
                                {% empty %}
                                <div class="alert alert-info">
                                    У вас пока нет плейлистов. <a href="{% url 'create_playlist' %}">Создать плейлист</a>
                                </div>
                                {% endfor %}
                            </div>
                        </div>
                        
                        <div class="d-flex justify-content-between">
                            <a href="{{ request.META.HTTP_REFERER }}" class="btn btn-secondary">
                                <i class="fas fa-times"></i> Отмена
                            </a>
                            <button type="submit" class="btn btn-primary">
                                <i class="fas fa-plus"></i> Добавить
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    // Get scroll position from URL if it exists
    const urlParams = new URLSearchParams(window.location.hash.substring(1));
    const scrollPos = urlParams.get('scroll');
    
    if (scrollPos) {
        document.getElementById('scrollPosition').value = scrollPos;
    } else {
        // If no scroll position in URL, get it from the referrer
        const referrer = document.querySelector('input[name="next"]').value;
        if (referrer) {
            const referrerUrl = new URL(referrer);
            const referrerScroll = referrerUrl.hash.match(/scroll=(\d+)/);
            if (referrerScroll) {
                document.getElementById('scrollPosition').value = referrerScroll[1];
            }
        }
    }
});
</script>
{% endblock %}
