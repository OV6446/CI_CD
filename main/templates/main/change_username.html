{% extends 'main/base.html' %}

{% block content %}
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card change-username-card">
                <div class="card-header">
                    <h3 class="text-center">Изменение имени пользователя</h3>
                </div>
                <div class="card-body">
                    <form method="post">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label for="id_new_username" class="form-label">Новое имя пользователя</label>
                            {{ form.new_username }}
                            {% if form.new_username.errors %}
                            <div class="alert alert-danger mt-2 mb-0 py-1 px-2">
                                {% for error in form.new_username.errors %}
                                <div>{{ error }}</div>
                                {% endfor %}
                            </div>
                            {% endif %}
                        </div>
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary">Сохранить</button>
                            <a href="{% url 'home' %}" class="btn btn-secondary">Отмена</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
