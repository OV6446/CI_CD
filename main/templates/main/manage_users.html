{% extends 'main/base.html' %}
{% block content %}
<div class="container mt-4">
    <h1 class="mb-4">Управление пользователями</h1>
    {% if users %}
        <div class="list-group">
            {% for user in users %}
            <div class="list-group-item d-flex justify-content-between align-items-center">
                <div>
                    <strong>{{ user.username }}</strong> ({{ user.email }})
                </div>
                <form action="{% url 'delete_user' user.id %}" method="post" class="d-inline">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger btn-sm" onclick="return confirm('Удалить пользователя {{ user.username }}?')">Удалить</button>
                </form>
            </div>
            {% endfor %}
        </div>
    {% else %}
        <div class="alert alert-info">Нет других пользователей.</div>
    {% endif %}
</div>
{% endblock %}
