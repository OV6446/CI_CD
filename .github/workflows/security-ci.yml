# CI/CD: проверки безопасности → ci-gate → deploy только после успеха всех jobs

name: Security CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Новый push отменяет старый run — deploy не «обгоняет» проверки
concurrency:
  group: security-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

env:
  DJANGO_SECRET_KEY: ci-django-secret-key-minimum-fifty-characters-long-x
  DJANGO_DEBUG: "false"
  DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1,testserver
  DJANGO_CSRF_TRUSTED_ORIGINS: http://localhost:8000,http://127.0.0.1:8000

jobs:
  tests:
    name: Функциональные тесты
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Установка зависимостей
        run: pip install -r requirements.txt

      - name: Django system check
        run: python manage.py check

      - name: Миграции
        run: python manage.py migrate --noinput

      - name: API-тесты
        run: python test_api.py

  sast-bandit:
    name: SAST (Bandit)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Установка Bandit
        run: pip install bandit[toml]

      - name: Сканирование Python-кода
        run: |
          bandit -r main myproject -f json -o bandit-report.json -c bandit.yaml \
            --severity-level medium || true
          bandit -r main myproject -c bandit.yaml --severity-level medium

      - name: Сохранение отчёта
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.json

  sca-dependencies:
    name: SCA (pip-audit)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Установка pip-audit
        run: pip install pip-audit

      - name: Проверка requirements.txt
        run: pip-audit -r requirements.txt --desc on

  secrets-scan:
    name: Secret scanning (Gitleaks)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  django-deploy-check:
    name: Django security check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Установка зависимостей
        run: pip install -r requirements.txt

      - name: check --deploy
        run: |
          python manage.py check --deploy 2>&1 | tee django-deploy-check.txt
          python manage.py check --deploy --fail-level ERROR

      - name: Сохранение отчёта
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: django-deploy-check
          path: django-deploy-check.txt

  container-scan:
    name: Container scan (Trivy)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Сборка образа
        run: docker build -t music-library:ci .

      - name: Trivy — уязвимости в образе
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: music-library:ci
          format: table
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true

      - name: Trivy — отчёт SARIF
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: music-library:ci
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: "0"
          ignore-unfixed: true

      - name: Артефакт отчёта Trivy
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: trivy-results.sarif

  dast-zap:
    name: DAST (OWASP ZAP baseline)
    runs-on: ubuntu-latest
    needs: tests
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Запуск приложения для сканирования
        run: |
          pip install -r requirements.txt
          python manage.py migrate --noinput
          python manage.py runserver 127.0.0.1:8000 &
          sleep 8
          curl -f http://127.0.0.1:8000/ -o /dev/null -s -L

      - name: OWASP ZAP baseline scan
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: http://127.0.0.1:8000
          fail_action: false
          allow_issue_writing: false

  # Явные «ворота»: deploy запускается ТОЛЬКО после успеха всех проверок
  ci-gate:
    name: CI gate — все проверки пройдены
    runs-on: ubuntu-latest
    needs:
      - tests
      - sast-bandit
      - sca-dependencies
      - secrets-scan
      - django-deploy-check
      - container-scan
      - dast-zap
    if: always()
    steps:
      - name: Проверка результатов jobs
        run: |
          check() {
            if [ "$1" != "success" ]; then
              echo "Job failed or skipped: $2 (status=$1)"
              exit 1
            fi
          }
          check "${{ needs.tests.result }}" "tests"
          check "${{ needs.sast-bandit.result }}" "sast-bandit"
          check "${{ needs.sca-dependencies.result }}" "sca-dependencies"
          check "${{ needs.secrets-scan.result }}" "secrets-scan"
          check "${{ needs.django-deploy-check.result }}" "django-deploy-check"
          check "${{ needs.container-scan.result }}" "container-scan"
          check "${{ needs.dast-zap.result }}" "dast-zap"
          echo "All CI checks passed."

  deploy:
    name: CD — deploy на сервер
    runs-on: ubuntu-latest
    needs: ci-gate
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    timeout-minutes: 10
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT != '' && secrets.SSH_PORT || '22' }}
          script: |
            set -e
            cd ~/CI_CD
            git fetch origin main
            git reset --hard origin/main
            if [ ! -f .env ]; then
              echo "ERROR: создайте файл .env из .env.example"
              exit 1
            fi
            docker compose up --build -d
            docker compose ps
