services:
  web:
    build: .
    ports:
      - "8000:8000"
    volumes:
      # Named volume: на чистом сервере bind-mount ./db.sqlite3 иногда создаёт каталог вместо файла
      - db_data:/app/db.sqlite3
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: myproject.settings

volumes:
  db_data:
